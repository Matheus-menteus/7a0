<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS:MAJOR // 7a0 DRAFT</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* === ESTÉTICA CS2 HUD === */
.cs-root * { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: #050608; /* Fundo geral da página bem escuro */
  display: flex;
  justify-content: center;
  padding: 20px;
}

.cs-root {
  /* Paleta Atualizada: Dark Mode tático, Laranja T e Azul CT */
  --bg: #0b0d10; 
  --bg2: #13161b; 
  --bg3: #1c2028; 
  --panel: #161a20;
  
  --grn: #2ecc71; --grn-dim: #1e824c; --grn-bg: rgba(46, 204, 113, 0.1);
  --amber: #e67e22; --amber-bg: rgba(230, 126, 34, 0.1); /* Laranja CS2 */
  --ct: #5D9CEC; --ct-bg: rgba(93, 156, 236, 0.15); /* Azul CT */
  --tr: #e67e22; --tr-bg: rgba(230, 126, 34, 0.15); /* Laranja TR */
  --red: #e74c3c; --red-bg: rgba(231, 76, 60, 0.15);
  
  --txt: #f0f2f5; --txt2: #8b94a6; --txt3: #5a6373; 
  --line: rgba(255, 255, 255, 0.05); --line2: rgba(255, 255, 255, 0.1);
  
  font-family: 'Inter', sans-serif;
  color: var(--txt);
  background: var(--bg);
  border: 1px solid var(--line2);
  border-radius: 8px;
  overflow: hidden;
  width: 100%;
  max-width: 950px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  /* Textura sutil de scanline de monitor HUD */
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.01) 2px, rgba(255,255,255,.01) 4px);
}

.mono { font-family: 'JetBrains Mono', monospace; }
.disp { font-family: 'Rajdhani', sans-serif; }
.cs-pad { padding: 20px }
.screen { display: none; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* HEADER */
.hud-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--bg2); border-bottom: 2px solid var(--grn-dim); }
.hud-logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.15em; color: var(--grn); display: flex; align-items: center; gap: 8px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
.hud-logo .sub { color: var(--amber); font-size: 12px; letter-spacing: 0.1em; }
.hud-status { font-size: 10px; color: var(--txt2); letter-spacing: 0.1em; text-align: right; line-height: 1.5; font-family: 'JetBrains Mono', monospace; }
.hud-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--grn); margin-right: 5px; box-shadow: 0 0 8px var(--grn); animation: blink 2s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* DRAFT SLOTS */
.slots-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
.slot { background: var(--panel); border: 1px solid var(--line2); border-radius: 6px; padding: 12px 8px; text-align: center; position: relative; transition: all .2s; }
.slot.filled { border-color: var(--grn-dim); background: var(--grn-bg); border-top: 3px solid var(--grn); }
.slot-role { font-size: 9px; letter-spacing: 0.1em; color: var(--txt3); margin-bottom: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; text-transform: uppercase; }
.slot.filled .slot-role { color: var(--grn); }
.slot-name { font-size: 13px; font-weight: 700; color: var(--txt); margin-bottom: 2px; }
.slot-from { font-size: 9px; color: var(--txt2); }
.slot-ovr { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; margin-top: 6px; }
.slot-empty { font-size: 16px; color: var(--txt3); margin: 10px 0; }

.ovr-strip { display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: var(--bg2); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 20px; }
.ovr-strip .lbl { font-size: 11px; color: var(--txt2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;}
.ovr-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ovr-fill { height: 100%; background: linear-gradient(90deg, var(--grn-dim), var(--grn)); border-radius: 3px; transition: width .5s; box-shadow: 0 0 10px rgba(46,204,113,.5); }
.ovr-num { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--grn); min-width: 40px; text-align: right; }

/* BOTÕES E DICE */
.dice-zone { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px 0; }
.dice { width: 80px; height: 80px; background: var(--bg2); border: 2px solid var(--grn-dim); border-radius: 12px; font-size: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: all .15s; color: var(--grn); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
.dice:hover { border-color: var(--grn); background: var(--grn-bg); box-shadow: 0 0 20px rgba(46,204,113,.2); }
.dice:active { transform: scale(.95); }
.dice-hint { font-size: 12px; color: var(--txt2); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 600; border: 1px solid var(--line2); border-radius: 4px; background: var(--bg2); color: var(--txt); cursor: pointer; text-transform: uppercase; transition: all .15s; letter-spacing: 0.05em; }
.btn:hover { border-color: var(--txt2); background: var(--panel); }
.btn-p { background: var(--grn-dim); color: #fff; border-color: var(--grn-dim); }
.btn-p:hover { background: var(--grn); border-color: var(--grn); box-shadow: 0 0 15px rgba(46,204,113,.3); }
.btn-s { border-color: var(--ct); color: var(--ct); }
.btn-s:hover { background: var(--ct-bg); }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; justify-content: center; }

/* CARDS DE LINEUP (DRAFT) */
.lineup-card { background: var(--panel); border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.lineup-header { padding: 14px 18px; background: var(--bg2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
.lineup-header .name { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--txt); }
.lineup-header .meta { font-size: 11px; color: var(--txt2); margin-top: 2px; }
.rating-badge { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; padding: 4px 12px; border-radius: 4px; background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(230,126,34,.3); }
.player-list { padding: 10px; }
.prow { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; margin-bottom: 6px; background: var(--bg2); transition: all .15s; }
.prow:hover:not(.disabled):not(.taken) { border-color: var(--grn); background: var(--grn-bg); }
.prow.disabled { opacity: 0.4; cursor: not-allowed; }
.prow.taken { opacity: 0.2; cursor: not-allowed; }
.prow.chosen { border-color: var(--grn); background: var(--grn-bg); box-shadow: inset 4px 0 0 var(--grn); }
.prow-wep { font-size: 16px; color: var(--txt3); width: 24px; text-align: center; }
.prow-role { font-size: 10px; color: var(--txt2); width: 60px; font-weight: 600; }
.prow-name { font-weight: 700; font-size: 14px; color: var(--txt); }
.prow-note { font-size: 11px; color: var(--txt3); margin-top: 2px; }
.prow-ovr { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; width: 34px; text-align: right; }

/* ===== PLACAR (O CORAÇÃO DO JOGO) ===== */
.match-stage { font-size: 11px; color: var(--txt2); letter-spacing: 0.15em; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; text-align: center; }
.board { background: var(--panel); border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.board-top { position: relative; padding: 24px 20px; background: #000; text-align: center; border-bottom: 1px solid var(--line); }
.board-mapbg { position: absolute; inset: 0; opacity: 0.2; background-size: cover; background-position: center; z-index: 0; }
.board-scanline { position: absolute; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.3) 2px, rgba(0,0,0,.3) 4px); pointer-events: none; }
.board-top-in { position: relative; z-index: 2; }
.board-maprow { font-size: 10px; color: var(--amber); letter-spacing: 0.2em; margin-bottom: 16px; text-transform: uppercase; font-weight: 700; }
.board-bigscore { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 10px; }
.board-sc { font-family: 'Rajdhani', sans-serif; font-size: 64px; font-weight: 700; line-height: 1; }
.board-sc.w { color: var(--grn); text-shadow: 0 0 30px rgba(46,204,113,.4); }
.board-sc.l { color: var(--red); text-shadow: 0 0 30px rgba(231,76,60,.4); }
.board-sc.tie { color: var(--txt); }
.board-sc-colon { font-family: 'Rajdhani', sans-serif; font-size: 40px; color: var(--txt3); }
.board-teams-lbl { font-size: 14px; color: var(--txt2); letter-spacing: 0.05em; font-family: 'Rajdhani', sans-serif; font-weight: 600;}
.board-teams-lbl b { color: var(--txt); font-size: 16px; }

/* LINHAS DE TIME LADO A LADO */
.match-teams-wrapper { display: flex; width: 100%; background: var(--bg); }
.team-block { flex: 1; border-right: 1px solid var(--line); }
.team-block:last-child { border-right: none; }
.team-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: 14px; font-weight: 700; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.05em; background: var(--bg2); border-bottom: 1px solid var(--line2); }
.team-head.tA { border-top: 3px solid var(--ct); }
.team-head.tB { border-top: 3px solid var(--tr); }
.team-head .tflag { font-size: 16px; }
.team-head .tname { flex: 1; color: var(--txt); }
.team-head .tside { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; }
.team-head.tA .tside { background: var(--ct-bg); color: var(--ct); }
.team-head.tB .tside { background: var(--tr-bg); color: var(--tr); }
.team-head .tovr { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt2); font-weight: 400; }
.sb-prow { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-size: 13px; border-bottom: 1px solid var(--line); background: var(--panel); }
.sb-prow:last-child { border-bottom: none; }
.sb-prow:nth-child(even) { background: var(--bg2); }
.sb-prow .sp-wep { width: 20px; text-align: center; color: var(--txt3); font-size: 16px; }
.sb-prow .sp-name { flex: 1; color: var(--txt); font-weight: 500; }
.sb-prow .sp-role { font-size: 10px; color: var(--txt2); letter-spacing: 0.05em; font-family: 'JetBrains Mono', monospace; }

/* FEED DE HIGHLIGHTS */
.hl-feed { padding: 16px; background: var(--bg); border-top: 1px solid var(--line); }
.hl-feed-t { font-size: 11px; color: var(--grn); letter-spacing: 0.1em; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; }
.hl-item { display: flex; gap: 12px; padding: 8px 0; font-size: 12px; border-bottom: 1px solid var(--line); align-items: center; }
.hl-item:last-child { border-bottom: none; }
.hl-wep { font-size: 16px; width: 24px; text-align: center; color: var(--amber); }
.hl-map { font-size: 10px; color: var(--txt3); width: 60px; font-weight: 700; text-transform: uppercase; }
.hl-text { color: var(--txt2); flex: 1; line-height: 1.4; }
.hl-text b { color: #fff; font-weight: 600; }

/* BANNER DE RESULTADO */
.res-banner { text-align: center; padding: 30px 20px; border-radius: 8px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid; }
.res-banner.win { border-color: var(--grn); background: linear-gradient(180deg, var(--grn-bg) 0%, transparent 100%); }
.res-banner.loss { border-color: var(--red); background: linear-gradient(180deg, var(--red-bg) 0%, transparent 100%); }
.res-banner h2 { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
.res-banner.win h2 { color: var(--grn); text-shadow: 0 0 20px rgba(46,204,113,.4); }
.res-banner.loss h2 { color: var(--red); text-shadow: 0 0 20px rgba(231,76,60,.5); }
.res-banner p { font-size: 13px; color: var(--txt2); }

/* VETO DE MAPAS */
.veto { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.veto-map { flex: 1; min-width: 80px; background: var(--bg2); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; position: relative; text-align: center; }
.veto-map .vm-img { height: 40px; background-size: cover; background-position: center; opacity: 0.4; }
.veto-map .vm-name { font-size: 10px; padding: 6px 2px; font-weight: 600; text-transform: uppercase; }
.veto-map .vm-tag { position: absolute; top: 4px; left: 4px; font-size: 8px; padding: 2px 4px; border-radius: 2px; font-weight: 700; z-index: 2; }
.veto-map.picked { border-color: var(--amber); }
.veto-map.picked .vm-tag { background: var(--amber); color: #000; }
.veto-map.picked .vm-img { opacity: 0.8; }
.veto-map.banned { opacity: 0.3; }
.veto-map.banned .vm-tag { background: var(--red); color: #fff; }
.veto-map.banned .vm-img { filter: grayscale(1); }

/* TABELA SUIÇA */
.stbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; background: var(--panel); border: 1px solid var(--line2); border-radius: 6px; overflow: hidden; text-align: left; }
.stbl th { padding: 12px 16px; font-size: 10px; font-weight: 700; color: var(--txt3); border-bottom: 1px solid var(--line2); text-transform: uppercase; background: var(--bg2); }
.stbl td { padding: 12px 16px; border-bottom: 1px solid var(--line); color: var(--txt); }
.stbl tr.pr td { background: rgba(93, 156, 236, 0.1); color: var(--ct); font-weight: 600; border-left: 3px solid var(--ct); }
.rw { color: var(--grn); font-weight: 700; }
.rl { color: var(--red); font-weight: 700; }

.divider { height: 1px; background: var(--line2); margin: 20px 0; }
</style>
</head>

    {name:'Boombl4',role:'IGL',ovr:82,aim:78,clutch:80,sense:88,entry:76,utility:88,awp:0,note:'IGL sólido'},

    {name:'B1T',role:'Lurker',ovr:86,aim:88,clutch:80,sense:84,entry:80,utility:78,awp:0,note:'Prodígio 19 anos'},
  ]}
];

const PLAYER_HL={'FalleN':[['ti-bomb','<b>FalleN</b> resolveu um 1v3 impossível no pós-plant com a Deagle']],'s1mple':[['ti-crosshair','<b>s1mple</b> deu um jumpshot de AWP que ninguém acreditou']],'ZywOo':[['ti-crosshair','<b>ZywOo</b> pescou meio de AWP com uma arma que pegou do chão']]};
const GENERIC_HL=[['ti-device-gamepad-2','<b>{p}</b> segurou um clutch importante no pós-plant'],['ti-flame','<b>{p}</b> abriu o round com um opening kill limpo']];

let G={slots:{IGL:null,AWPer:null,Entry:null,Support:null,Lurker:null},usedL:new Set(),takenP:new Set(),curL:null,pick:null,swiss:{},swRound:1,swWins:0,swLosses:0,myOvr:0,myTeam:null,bracket:[]};

// ÁUDIO
let actx=null;const ac=()=>{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx};
const beep=(f,d,v=.14,t='square')=>{try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
const sfx={dice:()=>{beep(300,.08,.18,'sawtooth');},pick:()=>{beep(880,.06,.12,'sine');},block:()=>{beep(180,.2,.2,'sawtooth');},win:()=>{[523,659,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,.18,'sine'),i*100));},loss:()=>{[380,280].forEach((f,i)=>setTimeout(()=>beep(f,.22,.18,'sawtooth'),i*130));},round:()=>{beep(900,.04,.12,'sine');}};

// LÓGICA DE SIMULAÇÃO
function roundProb(rA,rB){let p=0.5+((rA-rB)/100)*0.95;p+=(Math.random()-0.5)*0.10;return Math.max(0.30,Math.min(0.70,p));}
function simMap(rA,rB){const p=roundProb(rA,rB);let a=0,b=0,ot=false;while(a<13&&b<13){if(Math.random()<p)a++;else b++;if(a===12&&b===12)break;}if(a===12&&b===12){ot=true;while(true){let oa=0,ob=0;for(let i=0;i<6;i++){if(Math.random()<p)oa++;else ob++;}a+=oa;b+=ob;if(oa>ob){a=Math.max(a,b+1);break;}if(ob>oa){b=Math.max(b,a+1);break;}}}return{mA:a,mB:b,ot,winner:a>b?'A':'B'};}
function simSeries(rA,rB,mapsNeeded){const mpool=[...MAPS_POOL].sort(()=>Math.random()-.5);const maps=[];let wA=0,wB=0,mi=0;while(wA<mapsNeeded&&wB<mapsNeeded){const m=simMap(rA,rB);m.mapName=mpool[mi%mpool.length];mi++;maps.push(m);if(m.winner==='A')wA++;else wB++;}return{maps,wA,wB,won:wA>=mapsNeeded,pool:mpool};}

function genHL(maps,myP,oppP){const out=[];const mn=myP.map(p=>p.name);const on=oppP?oppP.map(p=>p.name):[];maps.forEach(m=>{const mw=m.winner==='A';const n=1+Math.floor(Math.random()*2);for(let i=0;i<n;i++){const fm=mw?(Math.random()<.62):(Math.random()<.38);const pool=fm?mn:(on.length?on:mn);const pn=pool[Math.floor(Math.random()*pool.length)];let wep,t;if(PLAYER_HL[pn]){const a=PLAYER_HL[pn];[wep,t]=a[Math.floor(Math.random()*a.length)];}else{const g=GENERIC_HL[Math.floor(Math.random()*GENERIC_HL.length)];wep=g[0];t=g[1].replace('{p}',pn);}out.push({map:m.mapName,text:t,mine:fm,wep});}});return out;}

const ovrColor=v=>v>=95?'var(--grn)':v>=88?'var(--ct)':v>=78?'var(--amber)':'var(--red)';
function showScreen(id){document.querySelectorAll('.cs-root .screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setPhase(t){document.getElementById('hud-phase').textContent=t;}
const wepIcon=r=>`<i class="ti ${ROLE_WEP[r]}"></i>`;

// DRAFTING
function renderSlots(){
  document.getElementById('slots').innerHTML=ROLES.map(r=>{const p=G.slots[r];return p?`<div class="slot filled"><div class="slot-role">${wepIcon(r)} ${r}</div><div class="slot-name">${p.name}</div><div class="slot-from">${p._from}</div><div class="slot-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</div></div>`:`<div class="slot"><div class="slot-role">${wepIcon(r)} ${r}</div><div class="slot-empty">—</div><div style="font-size:9px;color:var(--txt3);">Vazio</div></div>`;}).join('');
  const f=Object.values(G.slots).filter(Boolean);const ovr=f.length?Math.round(f.reduce((a,p)=>a+p.ovr,0)/f.length):0;
  document.getElementById('ovr-fill').style.width=(ovr||0)+'%';document.getElementById('ovr-num').textContent=ovr||'—';setPhase(`DRAFT ${f.length}/5`);
  document.getElementById('draft-btns').innerHTML=f.length===5?`<button class="btn btn-p" onclick="startMajor()"><i class="ti ti-player-play"></i> Entrar no Major (OVR ${ovr})</button>`:'';
}
const DF=['⚀','⚁','⚂','⚃','⚄','⚅'];
function rollDice(){sfx.dice();const d=document.getElementById('dice'),h=document.getElementById('dice-hint');h.textContent='SORTEANDO...';let c=0;const iv=setInterval(()=>{d.textContent=DF[Math.floor(Math.random()*6)];c++;if(c>12){clearInterval(iv);revealLineup();}},55);}
function revealLineup(){if(!LINEUPS.filter(l=>!G.usedL.has(l.id)).length)G.usedL.clear();const av=LINEUPS.filter(l=>!G.usedL.has(l.id));const l=av[Math.floor(Math.random()*av.length)];G.usedL.add(l.id);G.curL=l;G.pick=null;document.getElementById('dice-hint').textContent=`▸ ${l.country} ${l.name} ${l.era}`;renderLineup(l);}
function renderLineup(l){
  const empty=ROLES.filter(r=>!G.slots[r]);
  let h=`<div class="lineup-card"><div class="lineup-header"><div><div class="name disp">${l.country} ${l.name}</div><div class="meta">${l.era} · ${l.style}</div></div><div class="rating-badge">OVR ${l.rating}</div></div><div class="player-list">`;
  l.players.forEach(p=>{const taken=G.takenP.has(p.name+l.id),blocked=!empty.includes(p.role),chosen=G.pick&&G.pick.name===p.name,dis=taken||blocked;const cls='prow'+(dis?' disabled':'')+(taken?' taken':'')+(chosen?' chosen':'');const reason=taken?'já selecionado':blocked?`${p.role} ocupado`:'';const click=dis?'':`onclick="pickP('${l.id}','${p.name}')"`;h+=`<div class="${cls}" ${click}><div class="prow-wep">${wepIcon(p.role)}</div><div class="prow-role">${p.role}</div><div style="flex:1"><div class="prow-name">${p.name} ${reason?`<span style="font-size:10px;color:var(--red); font-weight:normal">(${reason})</span>`:''}</div><div class="prow-note">${p.note}</div></div><div class="prow-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</div></div>`;});
  h+=`</div></div>`;
  h+=G.pick?`<div class="btn-row"><button class="btn btn-s" onclick="confirmP()"><i class="ti ti-check"></i> Escolher ${G.pick.name} (${G.pick.role})</button><button class="btn" onclick="rollDice()"><i class="ti ti-refresh"></i> Rolar Novamente</button></div>`:`<div class="btn-row"><button class="btn" onclick="rollDice()"><i class="ti ti-refresh"></i> Pular e Sortear Outro</button></div>`;
  document.getElementById('lineup-reveal').innerHTML=h;
}
function pickP(lid,pname){const l=LINEUPS.find(x=>x.id===lid),p=l.players.find(x=>x.name===pname),empty=ROLES.filter(r=>!G.slots[r]);if(!empty.includes(p.role)||G.takenP.has(p.name+lid)){sfx.block();return;}sfx.pick();G.pick={...p,_from:`${l.name} ${l.era}`,_lid:lid};renderLineup(l);}
function confirmP(){if(!G.pick)return;G.slots[G.pick.role]=G.pick;G.takenP.add(G.pick.name+G.pick._lid);G.pick=null;G.curL=null;document.getElementById('lineup-reveal').innerHTML='';document.getElementById('dice-hint').textContent='clique no dado para o próximo jogador';sfx.win();renderSlots();}

// SCOREBOARD MODIFICADO PARA LADO A LADO
function renderVeto(res,bo){
  const played=res.maps.map(m=>m.mapName);const total=bo===1?1:(bo===3?3:5);const shown=res.pool.slice(0,Math.max(total,played.length)).slice(0,total<3?3:total+2);
  let v=`<div class="veto">`;
  shown.forEach((mp)=>{
    const wasPlayed=played.includes(mp);const isDecider=bo>1&&wasPlayed&&played.indexOf(mp)===played.length-1&&played.length===total;
    let cls='veto-map',tag='';
    if(bo===1){if(wasPlayed){cls+=' picked';tag='PICK';}else{cls+=' banned';tag='BAN';}}
    else{if(isDecider){cls+=' picked';tag='DEC';}else if(wasPlayed){cls+=' picked';tag='PICK';}else{cls+=' banned';tag='BAN';}}
    v+=`<div class="${cls}"><div class="vm-tag">${tag}</div><div class="vm-img" style="background-color:${MAP_BG[mp]||'#555'}"></div><div class="vm-name">${mp}</div></div>`;
  });
  return v+`</div>`;
}

function renderScoreboard(res,oppTeam,isWin,stageName,bo){
  const {maps,wA,wB}=res;const myP=G.myTeam.players;const oppP=oppTeam.players||[];const lastMap=maps[maps.length-1];const bg=MAP_BG[lastMap.mapName]||'#111';
  let bigA,bigB,sub;if(maps.length===1){bigA=lastMap.mA;bigB=lastMap.mB;sub=`${lastMap.mapName}${lastMap.ot?' (OT)':''}`;}else{bigA=wA;bigB=wB;sub=`Série · BO${bo}`;}
  
  let b=renderVeto(res,bo);
  b+=`<div class="board"><div class="board-top"><div class="board-mapbg" style="background-color:${bg}"></div><div class="board-scanline"></div><div class="board-top-in">
    <div class="board-maprow"><span>${stageName}</span><span style="color:var(--txt3); margin:0 10px;">//</span><span>${sub}</span></div>
    <div class="board-bigscore"><span class="board-sc ${isWin?'w':'l'}">${bigA}</span><span class="board-sc-colon">:</span><span class="board-sc ${isWin?'l':'w'}">${bigB}</span></div>
    <div class="board-teams-lbl"><b>⚡ Seu Time</b> &nbsp;VS&nbsp; <b>${oppTeam.country} ${oppTeam.name}</b></div></div></div>`;
  
  // A MUDANÇA PRINCIPAL: CONTÊINER FLEX PARA FICAR LADO A LADO
  b+=`<div class="match-teams-wrapper">`;
  
  // LADO ESQUERDO (SEU TIME)
  b+=`<div class="team-block"><div class="team-head tA"><span class="tflag">⚡</span><span class="tname disp">Seu Time</span><span class="tside">CT</span><span class="tovr">OVR ${G.myOvr}</span></div>`;
  myP.forEach(p=>{const st=p.ovr>=95;b+=`<div class="sb-prow"><span class="sp-wep" style="color:${st?'var(--amber)':'var(--txt3)'}">${wepIcon(p.role)}</span><span class="sp-name" style="color:${st?'var(--amber)':'var(--txt)'}">${p.name}</span><span class="sp-role">${p.role}</span></div>`;});
  b+=`</div>`;
  
  // LADO DIREITO (ADVERSÁRIO)
  b+=`<div class="team-block"><div class="team-head tB"><span class="tflag">${oppTeam.country}</span><span class="tname disp">${oppTeam.name}</span><span class="tside">TR</span><span class="tovr">OVR ${oppTeam.rating}</span></div>`;
  if(oppP.length){oppP.forEach(p=>{const st=p.ovr>=95;b+=`<div class="sb-prow"><span class="sp-wep" style="color:${st?'var(--amber)':'var(--txt3)'}">${wepIcon(p.role)}</span><span class="sp-name" style="color:${st?'var(--amber)':'var(--txt)'}">${p.name}</span><span class="sp-role">${p.role}</span></div>`;});}
  else{b+=`<div class="sb-prow"><span class="sp-name" style="color:var(--txt3); text-align:center; width:100%;">Elenco Oculto</span></div>`;}
  b+=`</div></div>`; // Fecha team-block e match-teams-wrapper

  const hls=genHL(maps,myP,oppP);
  b+=`<div class="hl-feed"><div class="hl-feed-t">Feed de Eventos</div>`;hls.forEach(h=>{b+=`<div class="hl-item"><span class="hl-wep"><i class="ti ${h.wep}"></i></span><span class="hl-map">${h.map}</span><span class="hl-text">${h.text}</span></div>`;});b+=`</div></div>`;
  return b;
}

// INICIANDO E RODANDO O JOGO
function startMajor(){sfx.round();const f=Object.values(G.slots).filter(Boolean);G.myOvr=Math.round(f.reduce((a,p)=>a+p.ovr,0)/f.length);G.myTeam={id:'myteam',name:'Seu Time',era:'',country:'⚡',rating:G.myOvr,players:f};const opps=LINEUPS.filter(l=>!f.some(p=>p._lid===l.id)).sort(()=>Math.random()-.5).slice(0,15);G.bracket=opps;G.swiss={};G.swRound=1;G.swWins=0;G.swLosses=0;[G.myTeam,...opps].forEach(t=>{G.swiss[t.id]={wins:0,losses:0,team:t};});showScreen('s-swiss');renderSwiss();}
function pickOpp(){const ps=G.swiss['myteam'];const same=Object.values(G.swiss).filter(s=>s.team.id!=='myteam'&&s.wins===ps.wins&&s.losses===ps.losses);const pool=same.length?same:Object.values(G.swiss).filter(s=>s.team.id!=='myteam'&&s.wins+s.losses<5);return pool[Math.floor(Math.random()*pool.length)].team;}

function renderSwiss(){
  const ps=G.swiss['myteam'];const opp=pickOpp();setPhase(`SUÍÇA ${ps.wins}V - ${ps.losses}D`);
  const standing=Object.values(G.swiss).sort((a,b)=>(b.wins-b.losses)-(a.wins-a.losses));
  let tbl=`<table class="stbl"><thead><tr><th>#</th><th>Equipe</th><th>V</th><th>D</th></tr></thead><tbody>`;
  standing.forEach((s,i)=>{const mine=s.team.id==='myteam';tbl+=`<tr class="${mine?'pr':''}"><td style="color:var(--txt3)">${i+1}</td><td>${s.team.country} ${s.team.name}</td><td class="rw">${s.wins}</td><td class="rl">${s.losses}</td></tr>`;});tbl+=`</tbody></table>`;
  
  document.getElementById('swiss-content').innerHTML=`<div class="match-stage">Rodada ${G.swRound} // Fase Suíça // BO1</div>
  <div class="board"><div class="board-top"><div class="board-mapbg"></div><div class="board-scanline"></div><div class="board-top-in"><div class="board-maprow"><span>Partida Encontrada</span></div><div class="board-bigscore"><span class="board-sc tie">⚡</span><span class="board-sc-colon">VS</span><span class="board-sc tie">${opp.country}</span></div><div class="board-teams-lbl"><b>Seu Time [OVR ${G.myOvr}]</b> &nbsp;VS&nbsp; <b>${opp.name} [OVR ${opp.rating}]</b></div></div></div></div>
  <div class="btn-row" style="margin-bottom: 20px;"><button class="btn btn-p" onclick="resolveSwiss('${opp.id}')"><i class="ti ti-player-play"></i> Iniciar BO1</button></div>
  <div class="divider"></div>${tbl}`;
}

function resolveSwiss(oppId){
  const opp=LINEUPS.find(t=>t.id===oppId)||{name:'Adversário',country:'🌍',rating:85,players:[]};
  const res=simSeries(G.myOvr,opp.rating,1);const won=res.won;const ps=G.swiss['myteam'];
  if(won){ps.wins++;G.swWins++;sfx.win();}else{ps.losses++;G.swLosses++;sfx.loss();}
  if(G.swiss[oppId]){if(won)G.swiss[oppId].losses++;else G.swiss[oppId].wins++;}
  G.swRound++;const board=renderScoreboard(res,opp,won,'Fase Suíça',1);setPhase(`SUÍÇA ${ps.wins}V - ${ps.losses}D`);
  
  const cont=document.getElementById('swiss-content');
  if(ps.wins>=3){cont.innerHTML=`<div class="res-banner win"><h2><i class="ti ti-trophy"></i> CLASSIFICADO</h2><p>Você avançou para os Playoffs (${ps.wins}V-${ps.losses}D)</p></div>${board}<div class="btn-row"><button class="btn btn-p" onclick="startPlayoffs()">Ir para os Playoffs <i class="ti ti-arrow-right"></i></button></div>`;}
  else if(ps.losses>=3){cont.innerHTML=`<div class="res-banner loss"><h2><i class="ti ti-skull"></i> ELIMINADO</h2><p>Fim da linha na Fase Suíça (${ps.wins}V-${ps.losses}D)</p></div>${board}<div class="btn-row"><button class="btn btn-s" onclick="restartAll()">Novo Draft</button></div>`;}
  else{cont.innerHTML=`${board}<div class="btn-row"><button class="btn btn-p" onclick="renderSwiss()">Próxima Rodada <i class="ti ti-arrow-right"></i></button></div>`;}
}

// BÁSICO DE PLAYOFFS PARA MANTER FUNCIONALIDADE
function startPlayoffs(){G.playoffPool=[G.myTeam,...LINEUPS.slice(0,7)];showScreen('s-playoffs');renderPO('Quartas de Final','qf');}
function renderPO(stageName,stageKey){
  const opp=LINEUPS[Math.floor(Math.random()*LINEUPS.length)];setPhase(`PLAYOFFS`);
  document.getElementById('playoffs-content').innerHTML=`<div class="match-stage">${stageName} // BO3</div><div class="btn-row"><button class="btn btn-p" onclick="resolvePO('${opp.id}','${stageName}','${stageKey}')">Jogar ${stageName}</button></div>`;
}
function resolvePO(oppId,stageName,stageKey){
  const opp=LINEUPS.find(t=>t.id===oppId);const res=simSeries(G.myOvr,opp.rating,2);const won=res.won;
  const board=renderScoreboard(res,opp,won,stageName,3);
  if(!won){document.getElementById('playoffs-content').innerHTML=`<div class="res-banner loss"><h2>ELIMINADO NOS PLAYOFFS</h2><p>${stageName}</p></div>${board}<div class="btn-row"><button class="btn btn-s" onclick="restartAll()">Novo Draft</button></div>`;return;}
  const next={qf:{n:'Semifinal',k:'sf'},sf:{n:'Grande Final',k:'final'}};
  if(!next[stageKey]){document.getElementById('playoffs-content').innerHTML=`<div class="res-banner win"><h2>🏆 CAMPEÃO DO MAJOR</h2><p>Parabéns, sua lineup venceu!</p></div>${board}<div class="btn-row"><button class="btn btn-p" onclick="restartAll()">Novo Draft</button></div>`;return;}
  document.getElementById('playoffs-content').innerHTML=`<div class="res-banner win"><h2>VITÓRIA!</h2><p>Você avançou para a ${next[stageKey].n}</p></div>${board}<div class="btn-row"><button class="btn btn-p" onclick="renderPO('${next[stageKey].n}','${next[stageKey].k}')">Continuar</button></div>`;
}

function restartAll(){G={slots:{IGL:null,AWPer:null,Entry:null,Support:null,Lurker:null},usedL:new Set(),takenP:new Set(),curL:null,pick:null,swiss:{},swRound:1,swWins:0,swLosses:0,myOvr:0,myTeam:null,bracket:[]};document.getElementById('lineup-reveal').innerHTML='';document.getElementById('dice-hint').textContent='clique para sortear lineup';document.getElementById('dice').textContent='⚄';renderSlots();showScreen('s-draft');}
renderSlots();
</script>
