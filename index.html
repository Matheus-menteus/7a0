<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS:MAJOR // 7a0 DRAFT</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* === ESTÉTICA CS2 HUD === */
.cs-root * { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: #050608; /* Fundo geral da página bem escuro */
  display: flex;
  justify-content: center;
  padding: 20px;
}

.cs-root {
  /* Paleta Atualizada: Dark Mode tático, Laranja T e Azul CT */
  --bg: #0b0d10; 
  --bg2: #13161b; 
  --bg3: #1c2028; 
  --panel: #161a20;
  
  --grn: #2ecc71; --grn-dim: #1e824c; --grn-bg: rgba(46, 204, 113, 0.1);
  --amber: #e67e22; --amber-bg: rgba(230, 126, 34, 0.1); /* Laranja CS2 */
  --ct: #5D9CEC; --ct-bg: rgba(93, 156, 236, 0.15); /* Azul CT */
  --tr: #e67e22; --tr-bg: rgba(230, 126, 34, 0.15); /* Laranja TR */
  --red: #e74c3c; --red-bg: rgba(231, 76, 60, 0.15);
  
  --txt: #f0f2f5; --txt2: #8b94a6; --txt3: #5a6373; 
  --line: rgba(255, 255, 255, 0.05); --line2: rgba(255, 255, 255, 0.1);
  
  font-family: 'Inter', sans-serif;
  color: var(--txt);
  background: var(--bg);
  border: 1px solid var(--line2);
  border-radius: 8px;
  overflow: hidden;
  width: 100%;
  max-width: 950px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  /* Textura sutil de scanline de monitor HUD */
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.01) 2px, rgba(255,255,255,.01) 4px);
}

.mono { font-family: 'JetBrains Mono', monospace; }
.disp { font-family: 'Rajdhani', sans-serif; }
.cs-pad { padding: 20px }
.screen { display: none; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* HEADER */
.hud-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: var(--bg2); border-bottom: 2px solid var(--grn-dim); }
.hud-logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.15em; color: var(--grn); display: flex; align-items: center; gap: 8px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
.hud-logo .sub { color: var(--amber); font-size: 12px; letter-spacing: 0.1em; }
.hud-status { font-size: 10px; color: var(--txt2); letter-spacing: 0.1em; text-align: right; line-height: 1.5; font-family: 'JetBrains Mono', monospace; }
.hud-status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--grn); margin-right: 5px; box-shadow: 0 0 8px var(--grn); animation: blink 2s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* DRAFT SLOTS */
.slots-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
.slot { background: var(--panel); border: 1px solid var(--line2); border-radius: 6px; padding: 12px 8px; text-align: center; position: relative; transition: all .2s; }
.slot.filled { border-color: var(--grn-dim); background: var(--grn-bg); border-top: 3px solid var(--grn); }
.slot-role { font-size: 9px; letter-spacing: 0.1em; color: var(--txt3); margin-bottom: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; text-transform: uppercase; }
.slot.filled .slot-role { color: var(--grn); }
.slot-name { font-size: 13px; font-weight: 700; color: var(--txt); margin-bottom: 2px; }
.slot-from { font-size: 9px; color: var(--txt2); }
.slot-ovr { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; margin-top: 6px; }
.slot-empty { font-size: 16px; color: var(--txt3); margin: 10px 0; }

.ovr-strip { display: flex; align-items: center; gap: 14px; padding: 12px 18px; background: var(--bg2); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 20px; }
.ovr-strip .lbl { font-size: 11px; color: var(--txt2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;}
.ovr-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ovr-fill { height: 100%; background: linear-gradient(90deg, var(--grn-dim), var(--grn)); border-radius: 3px; transition: width .5s; box-shadow: 0 0 10px rgba(46,204,113,.5); }
.ovr-num { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--grn); min-width: 40px; text-align: right; }

/* BOTÕES E DICE */
.dice-zone { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px 0; }
.dice { width: 80px; height: 80px; background: var(--bg2); border: 2px solid var(--grn-dim); border-radius: 12px; font-size: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: all .15s; color: var(--grn); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
.dice:hover { border-color: var(--grn); background: var(--grn-bg); box-shadow: 0 0 20px rgba(46,204,113,.2); }
.dice:active { transform: scale(.95); }
.dice-hint { font-size: 12px; color: var(--txt2); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 600; border: 1px solid var(--line2); border-radius: 4px; background: var(--bg2); color: var(--txt); cursor: pointer; text-transform: uppercase; transition: all .15s; letter-spacing: 0.05em; }
.btn:hover { border-color: var(--txt2); background: var(--panel); }
.btn-p { background: var(--grn-dim); color: #fff; border-color: var(--grn-dim); }
.btn-p:hover { background: var(--grn); border-color: var(--grn); box-shadow: 0 0 15px rgba(46,204,113,.3); }
.btn-s { border-color: var(--ct); color: var(--ct); }
.btn-s:hover { background: var(--ct-bg); }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; justify-content: center; }

/* CARDS DE LINEUP (DRAFT) */
.lineup-card { background: var(--panel); border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.lineup-header { padding: 14px 18px; background: var(--bg2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
.lineup-header .name { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--txt); }
.lineup-header .meta { font-size: 11px; color: var(--txt2); margin-top: 2px; }
.rating-badge { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; padding: 4px 12px; border-radius: 4px; background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(230,126,34,.3); }
.player-list { padding: 10px; }
.prow { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; margin-bottom: 6px; background: var(--bg2); transition: all .15s; }
.prow:hover:not(.disabled):not(.taken) { border-color: var(--grn); background: var(--grn-bg); }
.prow.disabled { opacity: 0.4; cursor: not-allowed; }
.prow.taken { opacity: 0.2; cursor: not-allowed; }
.prow.chosen { border-color: var(--grn); background: var(--grn-bg); box-shadow: inset 4px 0 0 var(--grn); }
.prow-wep { font-size: 16px; color: var(--txt3); width: 24px; text-align: center; }
.prow-role { font-size: 10px; color: var(--txt2); width: 60px; font-weight: 600; }
.prow-name { font-weight: 700; font-size: 14px; color: var(--txt); }
.prow-note { font-size: 11px; color: var(--txt3); margin-top: 2px; }
.prow-ovr { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; width: 34px; text-align: right; }

/* ===== PLACAR (O CORAÇÃO DO JOGO) ===== */
.match-stage { font-size: 11px; color: var(--txt2); letter-spacing: 0.15em; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; text-align: center; }
.board { background: var(--panel); border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.board-top { position: relative; padding: 24px 20px; background: #000; text-align: center; border-bottom: 1px solid var(--line); }
.board-mapbg { position: absolute; inset: 0; opacity: 0.2; background-size: cover; background-position: center; z-index: 0; }
.board-scanline { position: absolute; inset: 0; z-index: 1;
