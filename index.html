/* ===== MOTOR DE PLACAR CS2 (reescrito) ===== */
// Equilibrado: favorito ganha mais, mas zebra rola. round prob baseada no overall.
function roundProb(rA,rB){
  const diff=(rA-rB);
  // diff de 10 pts overall => ~+13% de chance por round. cap pra zebra sempre rolar
  let p=0.5+(diff/100)*0.95;
  p+=(Math.random()-0.5)*0.10; // ruído leve por partida (dia bom/ruim)
  return Math.max(0.30,Math.min(0.70,p));
}
// Simula 1 mapa CS2: MR12 -> 13 pra vencer. OT MR3 (primeiro a vencer um OT por 4+ com 2 de vantagem... simplificado: cada OT 6 rounds, quem tiver mais vence; se empatar, novo OT)
function simMap(rA,rB){
  const p=roundProb(rA,rB);
  let a=0,b=0,ot=false;
  for(let i=0;i<24;i++){if(Math.random()<p)a++;else b++;}
  // após 24 rounds: se alguém chegou a 13 antes, ajusta (regular acaba quando um faz 13)
  // recalcula corretamente: regular termina assim que um atinge 13
  a=0;b=0;
  while(a<13&&b<13){
    if(Math.random()<p)a++;else b++;
    if(a===12&&b===12)break; // vai pra OT
  }
  if(a===12&&b===12){
    ot=true;
    let otA=0,otB=0;
    while(true){
      otA=0;otB=0;
      for(let i=0;i<6;i++){if(Math.random()<p)otA++;else otB++;}
      a+=otA;b+=otB;
      if(otA>otB){a=Math.max(a,b+1);break;}
      if(otB>otA){b=Math.max(b,a+1);break;}
      // empate no OT (3-3): joga outro OT
    }
  }
  return{mA:a,mB:b,ot,winner:a>b?'A':'B'};
}
// Bo-N: mapsNeeded = mapas pra vencer (1=Bo1, 2=Bo3, 3=Bo5)
function simSeries(rA,rB,mapsNeeded){
  const mpool=[...MAPS_POOL].sort(()=>Math.random()-.5);
  const maps=[];let wA=0,wB=0,mi=0;
  while(wA<mapsNeeded&&wB<mapsNeeded){
    const m=simMap(rA,rB);m.mapName=mpool[mi%mpool.length];mi++;
    maps.push(m);
    if(m.winner==='A')wA++;else wB++;
  }
  return{maps,wA,wB,won:wA>=mapsNeeded};
}

/* HIGHLIGHTS GENERATOR */
function genHighlights(maps,myPlayers,oppPlayers,oppName){
  const out=[];
  const myNames=myPlayers.map(p=>p.name);
  const oppNames=oppPlayers?oppPlayers.map(p=>p.name):[];
  maps.forEach(m=>{
    const myWon=m.winner==='A';
    // 1-2 highlights por mapa
    const n=1+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++){
      // 60% chance highlight do vencedor do mapa
      const fromMine=myWon?(Math.random()<0.62):(Math.random()<0.38);
      const pool=fromMine?myNames:(oppNames.length?oppNames:myNames);
      const pname=pool[Math.floor(Math.random()*pool.length)];
      let text;
      if(PLAYER_HL[pname]){
        const arr=PLAYER_HL[pname];text=arr[Math.floor(Math.random()*arr.length)];
      } else {
        text=GENERIC_HL[Math.floor(Math.random()*GENERIC_HL.length)].replace('{p}',pname);
      }
      out.push({map:m.mapName,text,mine:fromMine});
    }
  });
  return out;
}

function revealLineup(){if(!LINEUPS.filter(l=>!G.usedL.has(l.id)).length)G.usedL.clear();const av=LINEUPS.filter(l=>!G.usedL.has(l.id));const l=av[Math.floor(Math.random()*av.length)];G.usedL.add(l.id);G.curL=l;G.pick=null;document.getElementById('dice-hint').textContent=`SORTEADO: ${l.name} ${l.era}`;renderLineup(l);}
function renderLineup(l){
  const empty=ROLES.filter(r=>!G.slots[r]);
  let h=`<div class="lineup-card"><div class="lineup-header"><div><div class="name">${l.country} ${l.name}</div><div class="meta">${l.era} · ${l.style}</div></div><div class="rating-badge">Rating ${l.rating}</div></div><div class="player-list">`;
  l.players.forEach(p=>{
    const taken=G.takenP.has(p.name+l.id),blocked=!empty.includes(p.role),chosen=G.pick&&G.pick.name===p.name,dis=taken||blocked;
    const cls='prow'+(dis?' disabled':'')+(taken?' taken':'')+(chosen?' chosen':'');
    const attr=[];if(p.aim)attr.push(`AIM ${p.aim}`);if(p.clutch)attr.push(`CL ${p.clutch}`);if(p.sense)attr.push(`GS ${p.sense}`);if(p.awp>0)attr.push(`AWP ${p.awp}`);
    const reason=taken?'já foi':blocked?`${p.role} ocupado`:'';const click=dis?'':`onclick="pickP('${l.id}','${p.name}')"`;
    h+=`<div class="${cls}" ${click}><div class="prow-role">${RICO[p.role]} ${p.role}</div><div style="flex:1"><div class="prow-name">${p.name}${reason?` <span class="prow-block">[${reason}]</span>`:''}</div><div class="prow-note">${p.note}</div><div class="pip-row">${attr.map(a=>`<span class="pip">${a}</span>`).join('')}</div></div><div class="prow-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</div></div>`;
  });
  h+=`</div></div>`;
  h+=G.pick?`<div class="btn-row"><button class="btn btn-s" onclick="confirmP()">Confirmar ${G.pick.name} como ${G.pick.role} ↗</button><button class="btn" onclick="rollDice()">Sortear outro</button></div>`:`<div class="btn-row"><button class="btn" onclick="rollDice()">Sortear outro time</button></div>`;
  document.getElementById('lineup-reveal').innerHTML=h;
}
function pickP(lid,pname){const l=LINEUPS.find(x=>x.id===lid),p=l.players.find(x=>x.name===pname),empty=ROLES.filter(r=>!G.slots[r]);if(!empty.includes(p.role)){sfx.block();return;}if(G.takenP.has(p.name+lid)){sfx.block();return;}sfx.pick();G.pick={...p,_from:`${l.name} ${l.era}`,_lid:lid};renderLineup(l);}
function confirmP(){if(!G.pick)return;G.slots[G.pick.role]=G.pick;G.takenP.add(G.pick.name+G.pick._lid);G.pick=null;G.curL=null;document.getElementById('lineup-reveal').innerHTML='';document.getElementById('dice-hint').textContent='CLIQUE PARA SORTEAR PRÓXIMA LINEUP';sfx.win();renderSlots();}

/* MAJOR */
function startMajor(){sfx.round();const f=Object.values(G.slots).filter(Boolean);G.myOvr=Math.round(f.reduce((a,p)=>a+p.ovr,0)/f.length);G.myTeam={id:'myteam',name:'Seu Time',era:'Draft',country:'⚡',rating:G.myOvr,style:'Sua lineup customizada',players:f};const opps=LINEUPS.filter(l=>!f.some(p=>p._lid===l.id)).sort(()=>Math.random()-.5).slice(0,15);G.bracket=opps;G.swiss={};G.swRound=1;G.swWins=0;G.swLosses=0;[G.myTeam,...opps].forEach(t=>{G.swiss[t.id]={wins:0,losses:0,team:t};});showScreen('s-swiss');renderSwiss();}

/* ===== HLTV SCOREBOARD RENDER ===== */
function renderScoreboard(res,oppTeam,isWin,stageName,boLabel){
  const {maps,wA,wB}=res;
  const myPlayers=G.myTeam.players;
  const oppPlayers=oppTeam.players||[];
  const lastMap=maps[maps.length-1];
  const bgColor=MAP_BG[lastMap.mapName]||'#5a6a7a';
  const seriesLabel=maps.length>1?`${wA} : ${wB}`:'';

  // big score = série se Bo3/Bo5, ou placar do mapa se Bo1
  let bigA,bigB,bigSub;
  if(maps.length===1){bigA=lastMap.mA;bigB=lastMap.mB;bigSub=`${lastMap.mapName}${lastMap.ot?' · OT':''}`;}
  else{bigA=wA;bigB=wB;bigSub=`Série Bo${boLabel} · ${maps.length} mapa${maps.length>1?'s':''}`;}

  let board=`<div class="hltv-board">
    <div class="hltv-top">
      <div class="hltv-mapbg" style="background-color:${bgColor}"></div>
      <div class="hltv-top-inner">
        <div class="hltv-maprow"><span>${stageName} · Bo${boLabel}</span><span>${bigSub}</span></div>
        <div class="hltv-bigscore">
          <span class="hltv-sc ${isWin?'w':'l'}">${bigA}</span>
          <span class="hltv-sc-colon">:</span>
          <span class="hltv-sc ${isWin?'l':'w'}">${bigB}</span>
        </div>
        <div class="hltv-half">⚡ Seu Time &nbsp;vs&nbsp; ${oppTeam.country} ${oppTeam.name}</div>
      </div>
    </div>`;

  // Team A (mine)
  board+=`<div class="hltv-team-block">
    <div class="hltv-team-head tA"><span class="tflag">⚡</span><span class="tname">Seu Time</span><span class="tovr">OVR ${G.myOvr}</span></div>`;
  myPlayers.forEach(p=>{board+=`<div class="hltv-prow"><span class="hp-name">${p.name}</span><span class="hp-role">${RICO[p.role]} ${p.role}</span></div>`;});
  board+=`</div>`;
  // Team B (opp)
  board+=`<div class="hltv-team-block">
    <div class="hltv-team-head tB"><span class="tflag">${oppTeam.country}</span><span class="tname">${oppTeam.name} ${oppTeam.era||''}</span><span class="tovr">OVR ${oppTeam.rating}</span></div>`;
  if(oppPlayers.length){oppPlayers.forEach(p=>{board+=`<div class="hltv-prow"><span class="hp-name">${p.name}</span><span class="hp-role">${RICO[p.role]} ${p.role}</span></div>`;});}
  else{board+=`<div class="hltv-prow"><span class="hp-name" style="color:#7a8293">lineup completa</span></div>`;}
  board+=`</div>`;

  // map results (only if >1 map)
  if(maps.length>1){
    board+=`<div class="maps-list"><div class="maps-list-title">Mapas da série</div>`;
    maps.forEach(m=>{const aw=m.winner==='A';board+=`<div class="map-line"><span class="mname">${m.mapName}</span><span class="mscore"><span class="ms ${aw?'w':'l'}">${m.mA}</span><span class="ms-sep">—</span><span class="ms ${aw?'l':'w'}">${m.mB}</span></span><span class="mot">${m.ot?'OT':''}</span><span class="mwin">${aw?'Seu Time':oppTeam.name}</span></div>`;});
    board+=`</div>`;
  }

  // highlights feed
  const hls=genHighlights(maps,myPlayers,oppPlayers,oppTeam.name);
  board+=`<div class="hl-feed"><div class="hl-feed-title">Melhores momentos</div>`;
  hls.forEach(h=>{board+=`<div class="hl-item"><span class="hl-map">${h.map}</span><span class="hl-text">${h.text}</span></div>`;});
  board+=`</div></div>`;

  return board;
}

/* SWISS */
function pickOpp(){const ps=G.swiss['myteam'];const same=Object.values(G.swiss).filter(s=>s.team.id!=='myteam'&&s.wins===ps.wins&&s.losses===ps.losses);const fall=Object.values(G.swiss).filter(s=>s.team.id!=='myteam'&&s.wins+s.losses<5);const pool=same.length?same:fall;return pool[Math.floor(Math.random()*pool.length)].team;}
function renderSwiss(){
  const ps=G.swiss['myteam'];const opp=pickOpp();
  document.getElementById('swiss-record').textContent=`${ps.wins}V — ${ps.losses}D`;
  const standing=Object.values(G.swiss).sort((a,b)=>(b.wins-b.losses)-(a.wins-a.losses));
  let tbl=`<table class="stbl"><thead><tr><th>#</th><th>Time</th><th>V</th><th>D</th><th>Status</th></tr></thead><tbody>`;
  standing.forEach((s,i)=>{const elim=s.losses>=3,adv=s.wins>=3,mine=s.team.id==='myteam';const st=adv?'PLAYOFFS':elim?'ELIM':'';tbl+=`<tr class="${mine?'pr':''} ${elim?'elim':''} ${adv&&!mine?'adv':''}"><td style="color:var(--color-text-tertiary)">${i+1}</td><td>${s.team.country} ${s.team.name}${mine?' ◀':''}</td><td class="rw">${s.wins}</td><td class="rl">${s.losses}</td><td style="color:var(--color-text-secondary);font-size:10px">${st||(s.team.rating||G.myOvr)}</td></tr>`;});
  tbl+=`</tbody></table>`;
  const lp=`<div class="team-lineup-preview"><div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:6px;letter-spacing:.07em">SUA LINEUP · OVR ${G.myOvr}</div>`+Object.values(G.slots).filter(Boolean).map(p=>`<div class="tlp-row"><span><span class="tlp-name">${p.name}</span><span class="tlp-meta">${p._from}</span></span><span class="tlp-role">${RICO[p.role]} ${p.role}</span><span class="tlp-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</span></div>`).join('')+`</div>`;
  document.getElementById('swiss-content').innerHTML=`<div class="match-stage">Rodada ${G.swRound} · Bo1</div>
  <div class="hltv-board"><div class="hltv-top"><div class="hltv-mapbg" style="background-color:#4a5a6a"></div><div class="hltv-top-inner"><div class="hltv-maprow"><span>Fase Suíça · Bo1</span><span>Próxima partida</span></div><div class="hltv-bigscore"><span class="hltv-sc tie">⚡</span><span class="hltv-sc-colon">vs</span><span class="hltv-sc tie">${opp.country}</span></div><div class="hltv-half">Seu Time [${G.myOvr}] &nbsp;vs&nbsp; ${opp.name} [${opp.rating}]</div></div></div>
  <div class="hl-feed"><div class="hl-feed-title">${opp.name} ${opp.era}</div><div class="hl-item"><span class="hl-text" style="font-style:italic">${opp.style}</span></div></div></div>
  <div class="btn-row"><button class="btn btn-p" onclick="resolveSwiss('${opp.id}')">Jogar Bo1 ↗</button></div>
  ${lp}<div class="divider"></div>${tbl}`;
}
function resolveSwiss(oppId){
  sfx.round();
  const opp=LINEUPS.find(t=>t.id===oppId)||G.bracket.find(t=>t.id===oppId)||{name:'Adversário',country:'🌍',style:'',rating:85,era:'',players:[]};
  const res=simSeries(G.myOvr,opp.rating,1);
  const won=res.won;const ps=G.swiss['myteam'];
  if(won){ps.wins++;G.swWins++;}else{ps.losses++;G.swLosses++;}
  if(G.swiss[oppId]){if(won)G.swiss[oppId].losses++;else G.swiss[oppId].wins++;}
  G.swRound++;
  const board=renderScoreboard(res,opp,won,'Fase Suíça',1);
  if(won)sfx.win();else sfx.loss();
  document.getElementById('swiss-record').textContent=`${ps.wins}V — ${ps.losses}D`;
  const cont=document.getElementById('swiss-content');
  if(ps.wins>=3){cont.innerHTML=`<div class="res-banner win"><h2>Playoffs!</h2><p>${ps.wins}V - ${ps.losses}D na fase suíça</p></div>${board}<div class="btn-row"><button class="btn btn-p" onclick="startPlayoffs()">Ir para os playoffs ↗</button></div>`;}
  else if(ps.losses>=3){cont.innerHTML=`<div class="res-banner loss"><h2>Eliminado</h2><p>${ps.wins}V - ${ps.losses}D na fase suíça</p></div>${board}<div class="stat-grid"><div class="sc"><div class="sc-v">${ps.wins}</div><div class="sc-l">vitórias</div></div><div class="sc"><div class="sc-v">${ps.losses}</div><div class="sc-l">derrotas</div></div><div class="sc"><div class="sc-v">${G.swRound-1}</div><div class="sc-l">rodadas</div></div><div class="sc"><div class="sc-v">${G.myOvr}</div><div class="sc-l">overall</div></div></div><div class="btn-row"><button class="btn btn-p" onclick="restartAll()">Novo draft ↗</button><button class="btn" onclick="restartMajor()">Repetir major</button></div>`;}
  else{cont.innerHTML=`${board}<div class="btn-row"><button class="btn btn-p" onclick="renderSwiss()">Próxima rodada ↗</button></div>`;}
}

/* PLAYOFFS */
function startPlayoffs(){const adv=Object.values(G.swiss).filter(s=>s.wins>=3&&s.team.id!=='myteam').slice(0,7).map(s=>s.team);G.playoffPool=[G.myTeam,...adv];G._poPlayed=[];showScreen('s-playoffs');document.getElementById('playoff-ovr').textContent=`Seu OVR: ${G.myOvr}`;renderPO('Quartas de Final','qf');}
function getOpp(ex=[]){const pool=G.playoffPool.filter(t=>t.id!=='myteam'&&!ex.includes(t.id));return pool[Math.floor(Math.random()*pool.length)]||LINEUPS[Math.floor(Math.random()*LINEUPS.length)];}
function renderPO(stageName,stageKey){
  const isFinal=stageKey==='final';const mapsNeeded=isFinal?3:2;
  const opp=getOpp(G._poPlayed||[]);G._curOpp=opp;
  document.getElementById('playoff-phase-lbl').textContent=`${stageName} · ${isFinal?'Bo5':'Bo3'}`;
  document.getElementById('playoffs-content').innerHTML=`<div class="match-stage">${stageName} — ${isFinal?'Bo5 (3 mapas)':'Bo3 (2 mapas)'}</div>
  <div class="hltv-board"><div class="hltv-top"><div class="hltv-mapbg" style="background-color:#5a4a6a"></div><div class="hltv-top-inner"><div class="hltv-maprow"><span>${stageName} · ${isFinal?'Bo5':'Bo3'}</span><span>Eliminação direta</span></div><div class="hltv-bigscore"><span class="hltv-sc tie">⚡</span><span class="hltv-sc-colon">vs</span><span class="hltv-sc tie">${opp.country}</span></div><div class="hltv-half">Seu Time [${G.myOvr}] &nbsp;vs&nbsp; ${opp.name} [${opp.rating}]</div></div></div>
  <div class="hl-feed"><div class="hl-feed-title">${opp.name} ${opp.era}</div><div class="hl-item"><span class="hl-text" style="font-style:italic">${opp.style}</span></div></div></div>
  <div class="btn-row"><button class="btn btn-p" onclick="resolvePO('${opp.id}','${stageName}','${stageKey}',${mapsNeeded})">Jogar ${isFinal?'Bo5':'Bo3'} ↗</button></div>`;
}
function resolvePO(oppId,stageName,stageKey,mapsNeeded){
  sfx.round();
  const opp=G.playoffPool.find(t=>t.id===oppId)||LINEUPS.find(t=>t.id===oppId)||{name:'Adversário',country:'🌍',style:'',rating:88,era:'',players:[]};
  const res=simSeries(G.myOvr,opp.rating,mapsNeeded);const won=res.won;const isFinal=stageKey==='final';
  const board=renderScoreboard(res,opp,won,stageName,isFinal?5:3);
  if(!won){showResult(false,stageName,opp,board);return;}
  sfx.win();G._poPlayed=G._poPlayed||[];G._poPlayed.push(oppId);
  const next={qf:{name:'Semifinal',key:'sf'},sf:{name:'Grande Final',key:'final'},final:null};
  if(!next[stageKey]){showResult(true,stageName,opp,board);return;}
  const n=next[stageKey];
  document.getElementById('playoffs-content').innerHTML=`${board}<div class="btn-row"><button class="btn btn-p" onclick="renderPO('${n.name}','${n.key}')">Continuar para ${n.name} ↗</button></div>`;
}
function showResult(won,stage,opp,board){
  if(won)sfx.win();else sfx.loss();showScreen('s-result');
  const slots=Object.values(G.slots).filter(Boolean);
  document.getElementById('result-content').innerHTML=`<div class="topbar" style="margin-bottom:1rem"><div class="topbar-logo">RESULTADO FINAL</div></div>
  <div class="res-banner ${won?'win':'loss'}"><h2>${won?'🏆 CAMPEÃO DO MAJOR!':'Eliminado — '+stage}</h2><p>${won?'Seu time dominou o Major — GGWP!':'Perdeu para '+opp.name+(opp.era?' ('+opp.era+')':'')+' na '+stage}</p></div>
  ${board}
  <div class="team-lineup-preview"><div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:6px;letter-spacing:.07em">SUA LINEUP — OVERALL ${G.myOvr}</div>${slots.map(p=>`<div class="tlp-row"><span><span class="tlp-name">${p.name}</span><span class="tlp-meta">${p._from}</span></span><span class="tlp-role">${RICO[p.role]} ${p.role}</span><span class="tlp-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</span></div>`).join('')}</div>
  <div class="stat-grid"><div class="sc"><div class="sc-v">${G.myOvr}</div><div class="sc-l">overall</div></div><div class="sc"><div class="sc-v">${G.swWins}</div><div class="sc-l">vit. suíça</div></div><div class="sc"><div class="sc-v">${G.swLosses}</div><div class="sc-l">der. suíça</div></div><div class="sc"><div class="sc-v">${won?'🏆':'💀'}</div><div class="sc-l">${stage}</div></div></div>
  <div class="btn-row"><button class="btn btn-p" onclick="restartAll()">Novo draft ↗</button><button class="btn" onclick="restartMajor()">Repetir o Major</button></div>`;
}
function restartAll(){G={slots:{IGL:null,AWPer:null,Entry:null,Support:null,Lurker:null},usedL:new Set(),takenP:new Set(),curL:null,pick:null,swiss:{},swRound:1,swWins:0,swLosses:0,myOvr:0,myTeam:null,bracket:[]};document.getElementById('lineup-reveal').innerHTML='';document.getElementById('dice-hint').textContent='CLIQUE PARA SORTEAR LINEUP';document.getElementById('dice').textContent='⚄';document.getElementById('draft-btns').innerHTML='';renderSlots();showScreen('s-draft');}
function restartMajor(){G.swiss={};G.swRound=1;G.swWins=0;G.swLosses=0;G._poPlayed=[];startMajor();}
renderSlots();
</script>
