<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#1a1d24;--c2:#22262f;--c3:#2a2f3a;--accent:#e8c84a;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--muted:#8892a4}
#app{font-family:var(--font-mono);padding:.75rem 0;color:var(--color-text-primary)}
.screen{display:none}.screen.active{display:block}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:1rem}
.topbar-logo{font-size:13px;font-weight:500;letter-spacing:.12em;color:var(--color-text-primary)}
.topbar-logo span{color:var(--color-text-warning);font-size:11px;margin-left:6px;letter-spacing:.06em}
.topbar-phase{font-size:10px;color:var(--color-text-secondary);letter-spacing:.08em}

/* SLOTS BAR */
.slots-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1rem}
.slot{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 8px;text-align:center;background:var(--color-background-primary);transition:border-color .15s}
.slot.filled{border-color:var(--color-border-success);background:var(--color-background-success)}
.slot-role{font-size:9px;letter-spacing:.1em;color:var(--color-text-tertiary);margin-bottom:4px;text-transform:uppercase}
.slot-name{font-size:11px;font-weight:500;line-height:1.3;color:var(--color-text-primary)}
.slot-from{font-size:9px;color:var(--color-text-secondary);margin-top:2px;line-height:1.3}
.slot-ovr{font-size:15px;font-weight:500;margin-top:3px;color:var(--color-text-success)}
.slot-empty{font-size:18px;color:var(--color-border-secondary);margin:6px 0 2px}

/* OVERALL BAR */
.ovr-strip{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:1rem;font-size:12px}
.ovr-strip .lbl{color:var(--color-text-secondary);flex:1}
.ovr-num{font-size:16px;font-weight:500;color:var(--color-text-info);font-family:var(--font-mono)}
.ovr-track{flex:2;height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.ovr-fill{height:100%;background:var(--color-text-info);border-radius:2px;transition:width .4s}

/* DICE AREA */
.dice-zone{display:flex;flex-direction:column;align-items:center;gap:8px;padding:1.25rem 0}
.dice{width:64px;height:64px;background:var(--color-background-secondary);border:.5px solid var(--color-border-primary);border-radius:var(--border-radius-lg);font-size:32px;line-height:64px;text-align:center;cursor:pointer;user-select:none;transition:transform .08s}
.dice:active{transform:scale(.9)}
.dice-hint{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.08em;text-align:center}

/* LINEUP CARD */
.lineup-card{border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:.75rem}
.lineup-header{padding:10px 14px;background:var(--color-background-secondary);display:flex;justify-content:space-between;align-items:flex-start;border-bottom:.5px solid var(--color-border-tertiary)}
.lineup-header .name{font-size:14px;font-weight:500}
.lineup-header .meta{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.lineup-header .rating-badge{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);background:var(--color-background-info);color:var(--color-text-info);font-weight:500;white-space:nowrap}
.player-list{padding:8px}
.prow{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:var(--border-radius-md);cursor:pointer;border:.5px solid transparent;margin-bottom:4px;transition:all .1s}
.prow:last-child{margin-bottom:0}
.prow:hover:not(.disabled):not(.taken){border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.prow.disabled{opacity:.32;cursor:not-allowed}
.prow.taken{opacity:.38;cursor:not-allowed}
.prow.chosen{border:.5px solid var(--color-border-success);background:var(--color-background-success)}
.prow-role{font-size:10px;color:var(--color-text-secondary);width:68px;padding-top:1px;line-height:1.4}
.prow-name{font-weight:500;font-size:13px;flex:1;line-height:1.3}
.prow-note{font-size:10px;color:var(--color-text-secondary);margin-top:2px;line-height:1.4}
.prow-block{font-size:9px;color:var(--color-text-danger);margin-top:2px}
.prow-ovr{font-size:14px;font-weight:500;width:28px;text-align:right;padding-top:1px}
.pip-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.pip{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;font-size:12px;font-family:var(--font-mono);border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;letter-spacing:.04em}
.btn:hover{background:var(--color-background-secondary)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}.btn-p:hover{opacity:.83;background:var(--color-text-primary)}
.btn-s{border-color:var(--color-border-success);color:var(--color-text-success)}.btn-s:hover{background:var(--color-background-success)}
.btn-d{border-color:var(--color-border-danger);color:var(--color-text-danger)}.btn-d:hover{background:var(--color-background-danger)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:.75rem}

/* MATCH DISPLAY */
.match-stage{font-size:10px;color:var(--color-text-tertiary);letter-spacing:.1em;margin-bottom:.5rem;text-transform:uppercase}
.match-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:.75rem}
.match-header{padding:8px 14px;background:var(--color-background-secondary);border-bottom:.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--color-text-secondary)}
.match-body{padding:14px}
.match-teams{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.match-team{flex:1;font-size:13px;font-weight:500}.match-team.r{text-align:right}
.match-vs{font-size:10px;color:var(--color-text-tertiary)}

/* MAP SCORES - CS2 STYLE */
.maps-container{margin:10px 0}
.map-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--color-border-tertiary)}
.map-row:last-child{border:none}
.map-name{font-size:10px;color:var(--color-text-secondary);width:70px;letter-spacing:.04em}
.map-scores{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.map-score{font-size:16px;font-weight:500;font-family:var(--font-mono);width:30px;text-align:center}
.map-score.w{color:var(--color-text-success)}.map-score.l{color:var(--color-text-danger)}.map-score.d{color:var(--color-text-secondary)}
.map-sep{font-size:12px;color:var(--color-text-tertiary)}
.map-winner{font-size:9px;padding:2px 7px;border-radius:3px}
.map-winner.w{background:var(--color-background-success);color:var(--color-text-success)}
.map-winner.l{background:var(--color-background-danger);color:var(--color-text-danger)}
.ot-tag{font-size:8px;color:var(--color-text-warning);margin-left:2px}

/* SERIES SCORE */
.series-score{display:flex;justify-content:center;align-items:center;gap:16px;padding:12px 0 4px;font-family:var(--font-mono)}
.ser-num{font-size:28px;font-weight:500}.ser-num.w{color:var(--color-text-success)}.ser-num.l{color:var(--color-text-danger)}
.ser-sep{font-size:18px;color:var(--color-text-tertiary)}
.ser-lbl{font-size:10px;text-align:center;color:var(--color-text-secondary);letter-spacing:.06em;margin-top:2px}

/* SWISS TABLE */
.stbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:1rem}
.stbl th{padding:5px 8px;font-size:10px;font-weight:500;color:var(--color-text-secondary);border-bottom:.5px solid var(--color-border-tertiary);letter-spacing:.07em;text-align:left}
.stbl td{padding:6px 8px;border-bottom:.5px solid var(--color-border-tertiary)}
.stbl tr.pr td{background:var(--color-background-info);color:var(--color-text-info)}
.stbl tr.elim td{opacity:.35}
.stbl tr.adv td{color:var(--color-text-success)}
.rw{color:var(--color-text-success);font-weight:500}.rl{color:var(--color-text-danger);font-weight:500}

.res-banner{text-align:center;padding:1.5rem;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:.75rem}
.res-banner.win{border-color:var(--color-border-success);background:var(--color-background-success)}
.res-banner.loss{border-color:var(--color-border-danger);background:var(--color-background-danger)}
.res-banner h2{font-size:20px;font-weight:500;margin-bottom:.3rem}
.res-banner.win h2{color:var(--color-text-success)}.res-banner.loss h2{color:var(--color-text-danger)}
.res-banner p{font-size:12px;color:var(--color-text-secondary)}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.75rem}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center}
.sc-v{font-size:18px;font-weight:500;font-family:var(--font-mono)}.sc-l{font-size:10px;color:var(--color-text-secondary);margin-top:2px}

.cmt{background:var(--color-background-secondary);border-left:2px solid var(--color-border-secondary);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:8px 12px;font-size:12px;color:var(--color-text-secondary);font-style:italic;margin:.5rem 0}

.team-lineup-preview{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:.75rem}
.tlp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:.5px solid var(--color-border-tertiary);font-size:11px}
.tlp-row:last-child{border:none}
.tlp-name{color:var(--color-text-primary)}.tlp-meta{font-size:9px;color:var(--color-text-tertiary);margin-left:4px}
.tlp-role{color:var(--color-text-secondary);font-size:10px}
.tlp-ovr{color:var(--color-text-info);font-weight:500}

.divider{height:.5px;background:var(--color-border-tertiary);margin:.75rem 0}
</style>

/* ---- CS2 SCORE ENGINE ---- */
// Returns array of map results: {mA, mB, ot, winner:'A'|'B'}
// CS2: first to 13 wins map; if 12-12, OT: MR3 (first to 4, then MR3 again if tied)
function simMap(rA,rB){
  const diff=(rA-rB)/100;
  const pA=Math.max(.15,Math.min(.85,.5+diff*.4+(Math.random()-.5)*.28));
  let a=0,b=0,ot=false,maxRounds=0;
  // Half 1
  for(let i=0;i<12;i++){if(Math.random()<pA)a++;else b++;}
  // Half 2
  for(let i=0;i<12;i++){if(Math.random()<pA)a++;else b++;}
  // Overtime MR3 loops
  while(a<13&&b<13){
    // Check if would be 12-12 at start of OT
    ot=true;
    for(let i=0;i<3;i++){if(Math.random()<pA)a++;else b++;}
    for(let i=0;i<3;i++){if(Math.random()<pA)a++;else b++;}
    // if still tied after 6 OT rounds, break somehow
    if(a===b){a++;} // deterministic tiebreak last resort
  }
  return{mA:a,mB:b,ot,winner:a>b?'A':'B'};
}

function simSeries(rA,rB,mapsNeeded){
  // mapsNeeded: 2 = Bo3, 3 = Bo5
  const maps=[];const mpool=[...MAPS_POOL].sort(()=>Math.random()-.5);
  let wA=0,wB=0;
  for(let i=0;i<mapsNeeded*2-1&&wA<mapsNeeded&&wB<mapsNeeded;i++){
    const res=simMap(rA,rB);
    res.mapName=mpool[i]||'Dust2';
    maps.push(res);
    if(res.winner==='A')wA++;else wB++;
  }
  return{maps,wA,wB,won:wA>=mapsNeeded};
}

const DF=['⚀','⚁','⚂','⚃','⚄','⚅'];
function rollDice(){
  sfx.dice();
  const d=document.getElementById('dice'),h=document.getElementById('dice-hint');
  h.textContent='SORTEANDO...';
  let c=0;const iv=setInterval(()=>{d.textContent=DF[Math.floor(Math.random()*6)];c++;if(c>12){clearInterval(iv);revealLineup();}},55);
}

function revealLineup(){
  const avail=LINEUPS.filter(l=>!G.usedL.has(l.id));
  if(!avail.length){G.usedL.clear();}
  const av2=LINEUPS.filter(l=>!G.usedL.has(l.id));
  const l=av2[Math.floor(Math.random()*av2.length)];
  G.usedL.add(l.id);G.curL=l;G.pick=null;
  document.getElementById('dice-hint').textContent=`SORTEADO: ${l.name} ${l.era}`;
  renderLineup(l);
}

function renderLineup(l){
  const el=document.getElementById('lineup-reveal');
  const empty=ROLES.filter(r=>!G.slots[r]);
  let h=`<div class="lineup-card"><div class="lineup-header"><div><div class="lineup-name">${l.country} ${l.name}</div><div class="lineup-meta">${l.era} · ${l.style}</div></div><div class="rating-badge">Rating ${l.rating}</div></div><div class="player-list">`;
  l.players.forEach(p=>{
    const taken=G.takenP.has(p.name+l.id);
    const blocked=!empty.includes(p.role);
    const chosen=G.pick&&G.pick.name===p.name;
    const dis=taken||blocked;
    const cls='prow'+(dis?' disabled':'')+(taken?' taken':'')+(chosen?' chosen':'');
    const attr=[];
    if(p.aim)attr.push(`AIM ${p.aim}`);
    if(p.clutch)attr.push(`CL ${p.clutch}`);
    if(p.sense)attr.push(`GS ${p.sense}`);
    if(p.awp>0)attr.push(`AWP ${p.awp}`);
    const reason=taken?'já foi':blocked?`${p.role} ocupado`:'';
    const click=dis?'':`onclick="pickP('${l.id}','${p.name}')"`;
    h+=`<div class="${cls}" ${click}><div class="prow-role">${RICO[p.role]} ${p.role}</div><div style="flex:1"><div class="prow-name">${p.name}${reason?` <span class="prow-block">[${reason}]</span>`:''}</div><div class="prow-note">${p.note}</div><div class="pip-row">${attr.map(a=>`<span class="pip">${a}</span>`).join('')}</div></div><div class="prow-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</div></div>`;
  });
  h+=`</div></div>`;
  const btnH=G.pick
    ?`<div class="btn-row"><button class="btn btn-s" onclick="confirmP()">Confirmar ${G.pick.name} como ${G.pick.role} ↗</button><button class="btn" onclick="rollDice()">Sortear outro</button></div>`
    :`<div class="btn-row"><button class="btn" onclick="rollDice()">Sortear outro time</button></div>`;
  el.innerHTML=h+btnH;
}

function pickP(lid,pname){
  const l=LINEUPS.find(x=>x.id===lid);const p=l.players.find(x=>x.name===pname);
  const empty=ROLES.filter(r=>!G.slots[r]);
  if(!empty.includes(p.role)){sfx.block();return;}
  if(G.takenP.has(p.name+lid)){sfx.block();return;}
  sfx.pick();G.pick={...p,_from:`${l.name} ${l.era}`,_lid:lid};
  renderLineup(l);
}

function confirmP(){
  if(!G.pick)return;
  G.slots[G.pick.role]=G.pick;G.takenP.add(G.pick.name+G.pick._lid);
  G.pick=null;G.curL=null;
  document.getElementById('lineup-reveal').innerHTML='';
  document.getElementById('dice-hint').textContent='CLIQUE PARA SORTEAR PRÓXIMA LINEUP';
  sfx.win();renderSlots();
}

  <div class="match-card">
    <div class="match-header"><span>Fase Suíça · Bo1</span><span>Mapa único</span></div>
    <div class="match-body">
      <div class="match-teams"><div class="match-team">⚡ Seu Time [${G.myOvr}]</div><div class="match-vs">vs</div><div class="match-team r">${opp.country} ${opp.name} [${opp.rating}]</div></div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin:.5rem 0">${opp.style}</div>
      <div class="btn-row"><button class="btn btn-p" onclick="resolveSwiss('${opp.id}')">Jogar Bo1 ↗</button></div>
    </div>
  </div>
  ${lineupHtml}
  <div class="divider"></div>${tbl}`;
}

function resolveSwiss(oppId){
  sfx.round();
  const opp=LINEUPS.find(t=>t.id===oppId)||G.bracket.find(t=>t.id===oppId)||{name:'Adversário',country:'🌍',style:'',rating:85,era:''};
  const res=simSeries(G.myOvr,opp.rating,1); // Bo1 = 1 map needed
  const won=res.won;
  const ps=G.swiss['myteam'];
  if(won){ps.wins++;G.swWins++;}else{ps.losses++;G.swLosses++;}
  if(G.swiss[oppId]){if(won)G.swiss[oppId].losses++;else G.swiss[oppId].wins++;}
  G.swRound++;

  const comment=(won?CMTS.win:CMTS.loss)[Math.floor(Math.random()*(won?CMTS.win:CMTS.loss).length)];
  const scoreHtml=renderSeriesResult(res,G.myOvr,opp.rating,'Seu Time',opp.name,won);
  const cont=document.getElementById('swiss-content');

  if(won)sfx.win();else sfx.loss();
  document.getElementById('swiss-record').textContent=`${ps.wins}V — ${ps.losses}D`;

  if(ps.wins>=3){
    cont.innerHTML=`<div class="res-banner win"><h2>Playoffs!</h2><p>${ps.wins}V - ${ps.losses}D na fase suíça</p></div>
    ${scoreHtml}<div class="cmt">${comment}</div>
    <div class="btn-row"><button class="btn btn-p" onclick="startPlayoffs()">Ir para os playoffs ↗</button></div>`;
  } else if(ps.losses>=3){
    cont.innerHTML=`<div class="res-banner loss"><h2>Eliminado</h2><p>${ps.wins}V - ${ps.losses}D na fase suíça</p></div>
    ${scoreHtml}<div class="cmt">${comment}</div>
    <div class="stat-grid">
      <div class="sc"><div class="sc-v">${ps.wins}</div><div class="sc-l">vitórias</div></div>
      <div class="sc"><div class="sc-v">${ps.losses}</div><div class="sc-l">derrotas</div></div>
      <div class="sc"><div class="sc-v">${G.swRound-1}</div><div class="sc-l">rodadas</div></div>
      <div class="sc"><div class="sc-v">${G.myOvr}</div><div class="sc-l">overall</div></div>
    </div>
    <div class="btn-row"><button class="btn btn-p" onclick="restartAll()">Novo draft ↗</button><button class="btn" onclick="restartMajor()">Repetir major</button></div>`;
  } else {
    cont.innerHTML=`${scoreHtml}<div class="cmt">${comment}</div><div class="btn-row"><button class="btn btn-p" onclick="renderSwiss()">Próxima rodada ↗</button></div>`;
  }
}

/* ---- PLAYOFFS ---- */
function startPlayoffs(){
  const advTeams=Object.values(G.swiss).filter(s=>s.wins>=3&&s.team.id!=='myteam').slice(0,7).map(s=>s.team);
  G.playoffPool=[G.myTeam,...advTeams];
  showScreen('s-playoffs');
  document.getElementById('playoff-ovr').textContent=`Seu OVR: ${G.myOvr}`;
  renderPO('Quartas de Final','qf');
}

function getOpp(exclude=[]){
  const pool=G.playoffPool.filter(t=>t.id!=='myteam'&&!exclude.includes(t.id));
  return pool[Math.floor(Math.random()*pool.length)]||LINEUPS[Math.floor(Math.random()*LINEUPS.length)];
}

function renderPO(stageName,stageKey){
  const isFinal=stageKey==='final';
  const mapsNeeded=isFinal?3:2; // Bo5 final, Bo3 resto
  const opp=getOpp(G._poPlayed||[]);
  if(!G._poPlayed)G._poPlayed=[];
  G._curOpp=opp;
  const cont=document.getElementById('playoffs-content');
  document.getElementById('playoff-phase-lbl').textContent=`${stageName} · ${isFinal?'Bo5':'Bo3'} · Eliminação direta`;

  cont.innerHTML=`<div class="match-stage">${stageName} — ${isFinal?'Bo5 (vence quem ganhar 3 mapas)':'Bo3 (vence quem ganhar 2 mapas)'}</div>
  <div class="match-card">
    <div class="match-header"><span>${stageName}</span><span>${isFinal?'Bo5':'Bo3'}</span></div>
    <div class="match-body">
      <div class="match-teams"><div class="match-team">⚡ Seu Time [${G.myOvr}]</div><div class="match-vs">vs</div><div class="match-team r">${opp.country} ${opp.name} [${opp.rating}]</div></div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin:.5rem 0">${opp.style}</div>
      <div class="btn-row"><button class="btn btn-p" onclick="resolvePO('${opp.id}','${stageName}','${stageKey}',${mapsNeeded})">Jogar ${isFinal?'Bo5':'Bo3'} ↗</button></div>
    </div>
  </div>`;
}

function resolvePO(oppId,stageName,stageKey,mapsNeeded){
  sfx.round();
  const opp=G.playoffPool.find(t=>t.id===oppId)||LINEUPS.find(t=>t.id===oppId)||{name:'Adversário',country:'🌍',style:'',rating:88,era:''};
  const res=simSeries(G.myOvr,opp.rating,mapsNeeded);
  const won=res.won;
  const scoreHtml=renderSeriesResult(res,G.myOvr,opp.rating,'Seu Time',opp.name,won);
  const isFinal=stageKey==='final';
  const comment=(won?(isFinal?CMTS.epic_win:CMTS.win):(isFinal?CMTS.epic_loss:CMTS.loss))[Math.floor(Math.random()*(won?(isFinal?CMTS.epic_win:CMTS.win):(isFinal?CMTS.epic_loss:CMTS.loss)).length)];
  if(!won){showResult(false,stageName,opp,scoreHtml,comment);return;}
  if(won)sfx.win();

  G._poPlayed=G._poPlayed||[];G._poPlayed.push(oppId);

  const next={qf:{name:'Semifinal',key:'sf'},sf:{name:'Grande Final',key:'final'},final:null};
  const cont=document.getElementById('playoffs-content');

  if(!next[stageKey]){showResult(true,stageName,opp,scoreHtml,comment);return;}

  const n=next[stageKey];
  document.getElementById('playoff-phase-lbl').textContent=`${n.name} · ${n.key==='final'?'Bo5':'Bo3'}`;
  cont.innerHTML=`${scoreHtml}<div class="cmt">${comment}</div>
  <div class="btn-row"><button class="btn btn-p" onclick="renderPO('${n.name}','${n.key}')">Continuar para ${n.name} ↗</button></div>`;
}

function showResult(won,stage,opp,scoreHtml,comment){
  if(won)sfx.win();else sfx.loss();
  showScreen('s-result');
  const slots=Object.values(G.slots).filter(Boolean);
  document.getElementById('result-content').innerHTML=`
    <div class="topbar" style="margin-bottom:1rem"><div class="topbar-logo">RESULTADO FINAL</div></div>
    <div class="res-banner ${won?'win':'loss'}">
      <h2>${won?'🏆 CAMPEÃO DO MAJOR!':'Eliminado — '+stage}</h2>
      <p>${won?'Seu time dominou o Major — GGWP!':'Perdeu para '+opp.name+(opp.era?' ('+opp.era+')':'')+' na '+stage}</p>
    </div>
    ${scoreHtml}
    <div class="cmt">${comment}</div>
    <div class="team-lineup-preview"><div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:6px;letter-spacing:.07em">SUA LINEUP — OVERALL ${G.myOvr}</div>
      ${slots.map(p=>`<div class="tlp-row"><span><span class="tlp-name">${p.name}</span><span class="tlp-meta">${p._from}</span></span><span class="tlp-role">${RICO[p.role]} ${p.role}</span><span class="tlp-ovr" style="color:${ovrColor(p.ovr)}">${p.ovr}</span></div>`).join('')}
    </div>
    <div class="stat-grid">
      <div class="sc"><div class="sc-v">${G.myOvr}</div><div class="sc-l">overall</div></div>
      <div class="sc"><div class="sc-v">${G.swWins}</div><div class="sc-l">vit. suíça</div></div>
      <div class="sc"><div class="sc-v">${G.swLosses}</div><div class="sc-l">der. suíça</div></div>
      <div class="sc"><div class="sc-v">${won?'🏆':'💀'}</div><div class="sc-l">${stage}</div></div>
    </div>
    <div class="btn-row"><button class="btn btn-p" onclick="restartAll()">Novo draft ↗</button><button class="btn" onclick="restartMajor()">Repetir o Major</button></div>`;
}

function restartAll(){
  G={slots:{IGL:null,AWPer:null,Entry:null,Support:null,Lurker:null},usedL:new Set(),takenP:new Set(),curL:null,pick:null,swiss:{},swRound:1,swWins:0,swLosses:0,myOvr:0,myTeam:null,bracket:[]};
  document.getElementById('lineup-reveal').innerHTML='';
  document.getElementById('dice-hint').textContent='CLIQUE PARA SORTEAR LINEUP';
  document.getElementById('dice').textContent='⚄';
  document.getElementById('draft-btns').innerHTML='';
  renderSlots();showScreen('s-draft');
}
function restartMajor(){G.swiss={};G.swRound=1;G.swWins=0;G.swLosses=0;G._poPlayed=[];startMajor();}

renderSlots();
</script>
